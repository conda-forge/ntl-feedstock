{% set version = "11.6.0" %}
{% set name = "ntl" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://libntl.org/ntl-{{ version }}.tar.gz
  sha256: bc0ef9aceb075a6a0673ac8d8f47d5f8458c72fe806e4468fbd5d3daff056182
  patches:
    - 0001-Do-not-run-binaries-when-cross-compiling-for-Silicon.patch  # [build_platform != target_platform and target_platform == "osx-arm64"]

build:
  number: 0
  skip: true        # [win]
  run_exports:
    - ntl {{ version }}

requirements:
  build:
    - libtool
    - automake
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
  host:
    - gf2x
    - gmp
  run:
    - gf2x
    - gmp

test:
  commands:
    - test -f $PREFIX/include/NTL/ZZ.h
    - test -f $PREFIX/lib/lib{{ name }}.a
    - test -f $PREFIX/lib/lib{{ name }}.so         # [linux]
    - test -f $PREFIX/lib/lib{{ name }}.dylib      # [osx]

about:
  home: https://libntl.org/
  doc_url: https://libntl.org/doc/tour.html
  dev_url: https://github.com/libntl/ntl
  license: LGPL-2.1-or-later
  license_file: doc/copying.txt
  summary: A Library for doing Number Theory
  description: |
    NTL is a high-performance, portable C++ library providing data structures and algorithms for manipulating signed, arbitrary length integers, and for vectors, matrices, and polynomials over the integers and over finite fields.

extra:
  recipe-maintainers:
    - isuruf
    - saraedum
